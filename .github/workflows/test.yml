name: Tests

on:
  pull_request:
    branches: [main, develop]

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyse
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage --exclude-tags golden

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  golden-linux:
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run golden tests (Linux)
        run: flutter test --tags golden

  golden-windows:
    runs-on: windows-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run golden tests (Windows)
        run: flutter test --tags golden

  integration-linux:
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install Linux GTK dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev \
            libblkid-dev \
            liblzma-dev \
            libasound2-dev \
            ninja-build \
            cmake \
            pkg-config \
            xvfb

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests (Linux desktop)
        run: xvfb-run --auto-servernum flutter test integration_test/app_test.dart -d linux

  integration-windows:
    runs-on: windows-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests (Windows desktop)
        run: flutter test integration_test/app_test.dart -d windows

  integration-android:
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests (Android emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: arm64-v8a
          profile: pixel_6
          script: flutter test integration_test/app_test.dart
